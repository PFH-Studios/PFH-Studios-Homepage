<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page not found | PFH Studios</title>
    <meta name="description" content="This page does not exist, but the right strategy does!" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        .not-found {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 2rem;
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        .nf-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(ellipse at 50% 50%,
                    rgba(147, 51, 234, 0.3) 0%,
                    rgba(109, 40, 217, 0.12) 50%,
                    transparent 75%);
            filter: blur(80px);
            animation: glow-pulse 5s ease-in-out infinite;
        }

        @keyframes glow-pulse {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.8;
            }
        }

        .nf-404 {
            font-size: clamp(6rem, 20vw, 14rem);
            font-weight: 900;
            letter-spacing: -0.06em;
            line-height: 1;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 2;
            margin-bottom: -1rem;
            user-select: none;
        }

        .nf-content {
            position: relative;
            z-index: 2;
        }

        .nf-content .pill {
            margin: 0 auto 1.5rem;
        }

        .nf-heading {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
        }

        .nf-sub {
            color: var(--gray-400);
            font-size: 1.0625rem;
            max-width: 400px;
            margin: 0 auto 2.5rem;
            line-height: 1.7;
        }

        .nf-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 4rem;
        }

        /* Floating particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(147, 51, 234, 0.6);
            animation: float-particle linear infinite;
            pointer-events: none;
        }

        @keyframes float-particle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 0.5;
            }

            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        /* Quick nav at bottom */
        .nf-nav {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .nf-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray-400);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: var(--transition-fast);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .nf-nav a:hover {
            color: var(--white);
            border-color: var(--border-hover);
            background: var(--surface-hover);
        }
    </style>
</head>

<body>
    <canvas id="starCanvas"></canvas>

    <nav id="mainNav">
        <a href="index.html" class="nav-logo">
            <div class="nav-logo-mark">PFH</div>
            PFH-Studios
        </a>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <a href="contact.html" class="btn btn-primary"
                style="padding:0.5rem 1.2rem;font-size:0.8125rem;">Contact</a>
        </div>
    </nav>

    <section class="not-found">
        <div class="nf-glow"></div>

        <!-- Floating particles -->
        <div class="particle" style="width:4px;height:4px;left:20%;animation-duration:8s;animation-delay:0s;"></div>
        <div class="particle" style="width:3px;height:3px;left:35%;animation-duration:11s;animation-delay:2s;"></div>
        <div class="particle" style="width:5px;height:5px;left:60%;animation-duration:9s;animation-delay:1s;"></div>
        <div class="particle" style="width:3px;height:3px;left:78%;animation-duration:13s;animation-delay:3s;"></div>
        <div class="particle" style="width:4px;height:4px;left:50%;animation-duration:10s;animation-delay:0.5s;"></div>

        <div class="nf-404">404</div>

        <div class="nf-content fade-up">
            <div class="pill pill-purple" style="display:inline-flex;margin-bottom:1.5rem;">
                <span class="pill-dot"></span>
                Page not found
            </div>

            <h1 class="nf-heading">
                Oh, this page does not exist.<br />
                <span class="gradient-text">But the right Strategy does.</span>
            </h1>

            <p class="nf-sub">
                No stress, theres a way back.
            </p>

            <div class="nf-links">
                <a href="index.html" class="btn btn-primary" style="padding:0.85rem 2rem;">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M19 12H5M12 5l-7 7 7 7" />
                    </svg>
                    Back to Homepage
                </a>
                <a href="contact.html" class="btn btn-ghost" style="padding:0.85rem 2rem;">
                    Get in Touch
                </a>
            </div>

            <div class="nf-nav">
                <a href="index.html">🏠 Home</a>
                <a href="contact.html">✉️ Contact</a>
                <a href="imprint.html">📄 Imprint</a>
                <a href="privacy.html">🔒 Privacy Policy</a>
                <a href="https://www.instagram.com/pfh_studios" target="_blank" rel="noopener">📸 Instagram</a>
            </div>
        </div>
    </section>

    <script src="main.js"></script>
</body>

</html>
